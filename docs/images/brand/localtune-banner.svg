<svg width="1600" height="320" viewBox="0 0 1600 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LocalTune Console banner</title>
  <desc id="desc">Brand banner for LocalTune Console, a local LLM fine-tuning control center.</desc>
